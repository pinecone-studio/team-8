name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run lint
        run: npm run lint

      - name: Build project
        run: npm run build

      - name: Build Cloudflare Pages output
        run: npx @cloudflare/next-on-pages@latest

      - name: Deploy Preview to Cloudflare Pages
        id: cloudflare_deploy
        if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' && secrets.CLOUDFLARE_PAGES_PROJECT_NAME != '' && !github.event.pull_request.head.repo.fork }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .vercel/output/static --project-name=${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }} --branch=pr-${{ github.event.number }}

      - name: Comment Preview URL on PR
        uses: actions/github-script@v7
        if: steps.cloudflare_deploy.outputs.deployment-url != ''
        with:
          script: |
            const marker = '<!-- cloudflare-preview -->';
            const url = '${{ steps.cloudflare_deploy.outputs.deployment-url }}';
            const body = [
              marker,
              '## ☁️ Cloudflare Preview',
              '',
              `**Preview URL:** ${url}`,
              '',
              '*Deployed via Wrangler Action*'
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(
              (c) => c.user?.type === 'Bot' && c.body?.includes(marker)
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

      - name: Comment why preview deploy was skipped
        uses: actions/github-script@v7
        if: ${{ secrets.CLOUDFLARE_API_TOKEN == '' || secrets.CLOUDFLARE_ACCOUNT_ID == '' || secrets.CLOUDFLARE_PAGES_PROJECT_NAME == '' || github.event.pull_request.head.repo.fork }}
        with:
          script: |
            const marker = '<!-- cloudflare-preview-skipped -->';
            const body = [
              marker,
              '## ☁️ Cloudflare Preview',
              '',
              'Preview deploy was skipped because required Cloudflare secrets are unavailable for this PR (common for forked PRs).'
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(
              (c) => c.user?.type === 'Bot' && c.body?.includes(marker)
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
