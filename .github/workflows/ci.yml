name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Backend codegen
        run: npm run codegen --workspace=backend

      - name: Frontend codegen
        run: npm run codegen --workspace=frontend

      - name: Backend lint
        run: npm run lint --workspace=backend

      - name: Frontend lint
        run: npm run lint --workspace=frontend

      - name: Backend type check
        run: npx tsc --noEmit --project backend/tsconfig.json

      - name: Frontend type check
        run: npx tsc --noEmit --project frontend/tsconfig.json
