mutation RequestBenefit($input: RequestBenefitInput!) {
  requestBenefit(input: $input) {
    id
    employeeId
    benefitId
    status
    contractVersionAccepted
    contractAcceptedAt
    reviewedBy
    requestedAmount
    repaymentMonths
    employeeApprovedAt
    declineReason
    createdAt
    updatedAt
    viewContractUrl
  }
}

mutation ApproveBenefitRequest($requestId: String!, $reviewedBy: String!) {
  approveBenefitRequest(requestId: $requestId, reviewedBy: $reviewedBy) {
    id
    employeeId
    benefitId
    status
    reviewedBy
    createdAt
    updatedAt
  }
}

mutation CancelBenefitRequest($requestId: String!, $employeeId: String!) {
  cancelBenefitRequest(requestId: $requestId, employeeId: $employeeId) {
    id
    employeeId
    benefitId
    status
    createdAt
    updatedAt
  }
}

mutation CreateBenefit($input: CreateBenefitInput!) {
  createBenefit(input: $input) {
    id
    name
    nameEng
    category
    subsidyPercent
    employeePercent
    unitPrice
    vendorName
    requiresContract
    flowType
    optionsDescription
  }
}
