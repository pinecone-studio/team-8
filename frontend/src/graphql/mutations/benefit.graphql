mutation RequestBenefit($input: RequestBenefitInput!) {
  requestBenefit(input: $input) {
    id
    employeeId
    benefitId
    status
    contractVersionAccepted
    contractAcceptedAt
    viewContractUrl
    requestedAmount
    repaymentMonths
    createdAt
    updatedAt
  }
}

mutation ConfirmBenefitRequest($requestId: String!, $contractAccepted: Boolean!) {
  confirmBenefitRequest(requestId: $requestId, contractAccepted: $contractAccepted) {
    id
    employeeId
    benefitId
    status
    contractVersionAccepted
    contractAcceptedAt
    createdAt
    updatedAt
  }
}

mutation ApproveBenefitRequest($requestId: String!, $reviewedBy: String!) {
  approveBenefitRequest(requestId: $requestId, reviewedBy: $reviewedBy) {
    id
    employeeId
    benefitId
    status
    reviewedBy
    createdAt
    updatedAt
  }
}

mutation DeclineBenefitRequest($requestId: String!, $reviewedBy: String!, $reason: String) {
  declineBenefitRequest(requestId: $requestId, reviewedBy: $reviewedBy, reason: $reason) {
    id
    employeeId
    benefitId
    status
    reviewedBy
    declineReason
    createdAt
    updatedAt
  }
}
