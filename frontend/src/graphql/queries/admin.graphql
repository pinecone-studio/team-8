query GetAdminDashboardSummary {
  adminDashboardSummary {
    totalEmployees
    activeBenefits
    pendingRequests
    lockedBenefits
    usageByCategory {
      label
      value
    }
    lockReasons {
      label
      value
    }
  }
}

query GetAdminBenefits {
  adminBenefits {
    id
    name
    nameEng
    category
    subsidyPercent
    employeePercent
    unitPrice
    vendorName
    requiresContract
    flowType
    optionsDescription
  }
}
