query GetAdminDashboardSummary {
  adminDashboardSummary {
    totalEmployees
    activeBenefits
    pendingRequests
    lockedBenefits
    usageByCategory {
      label
      value
    }
    lockReasons {
      label
      value
    }
    hrQueueCount
    financeQueueCount
    awaitingContractCount
    approvedThisWeekCount
    contractsExpiringSoon
    benefitsMissingContracts
    suspendedEnrollments
  }
}

query GetAdminBenefits {
  adminBenefits {
    id
    name
    description
    nameEng
    category
    subsidyPercent
    employeePercent
    unitPrice
    vendorName
    requiresContract
    flowType
    optionsDescription
    approvalPolicy
  }
}

query GetAuditLogActionTypes {
  auditLogActionTypes
}

query GetAuditLogs(
  $employeeId: String
  $benefitId: String
  $actionType: String
  $fromDate: String
  $toDate: String
  $limit: Int
) {
  auditLogs(
    employeeId: $employeeId
    benefitId: $benefitId
    actionType: $actionType
    fromDate: $fromDate
    toDate: $toDate
    limit: $limit
  ) {
    id
    actorEmployeeId
    actorRole
    actionType
    entityType
    entityId
    targetEmployeeId
    benefitId
    requestId
    contractId
    reason
    beforeJson
    afterJson
    metadataJson
    ipAddress
    createdAt
  }
}

query GetContractAcceptances($employeeId: String, $benefitId: String, $requestId: String) {
  contractAcceptances(employeeId: $employeeId, benefitId: $benefitId, requestId: $requestId) {
    id
    employeeId
    benefitId
    contractId
    contractVersion
    contractHash
    acceptedAt
    ipAddress
    requestId
    createdAt
  }
}

query GetEnrollments($employeeId: String, $benefitId: String) {
  enrollments(employeeId: $employeeId, benefitId: $benefitId) {
    id
    employeeId
    benefitId
    requestId
    status
    subsidyPercentApplied
    employeePercentApplied
    approvedBy
    startedAt
    endedAt
    createdAt
    updatedAt
  }
}

query GetNotifications {
  notifications {
    id
    type
    title
    body
    linkPath
    createdAt
    isRead
  }
}

query GetRuleProposals($benefitId: String, $status: String) {
  ruleProposals(benefitId: $benefitId, status: $status) {
    id
    benefitId
    ruleId
    changeType
    proposedData
    summary
    status
    proposedByEmployeeId
    reviewedByEmployeeId
    proposedAt
    reviewedAt
    reason
  }
}
