query GetDepartments {
  getDepartments
}

query GetEmployees($search: String, $department: String, $benefitId: String, $limit: Int) {
  getEmployees(search: $search, department: $department, benefitId: $benefitId, limit: $limit) {
    id
    avatarUrl
    name
    nameEng
    email
    role
    department
    responsibilityLevel
    employmentStatus
    hireDate
    okrSubmitted
    lateArrivalCount
    createdAt
    updatedAt
  }
}

query GetEmployee($id: String!) {
  getEmployee(id: $id) {
    id
    avatarUrl
    name
    nameEng
    email
    role
    department
    responsibilityLevel
    employmentStatus
    hireDate
    okrSubmitted
    lateArrivalCount
    lateArrivalUpdatedAt
    createdAt
    updatedAt
  }
}

query GetEmployeeByEmail($email: String!) {
  getEmployeeByEmail(email: $email) {
    id
    avatarUrl
    name
    nameEng
    email
    role
    department
    responsibilityLevel
    employmentStatus
    hireDate
    okrSubmitted
    lateArrivalCount
    lateArrivalUpdatedAt
    createdAt
    updatedAt
  }
}

query GetMySettings {
  mySettings {
    notificationEmail
    notificationEligibility
    notificationRenewals
    language
    timezone
  }
}
