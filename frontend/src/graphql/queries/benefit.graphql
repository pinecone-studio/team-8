query GetBenefitRequests {
  benefitRequests {
    id
    employeeId
    benefitId
    status
    contractVersionAccepted
    contractAcceptedAt
    reviewedBy
    requestedAmount
    repaymentMonths
    financeProposedAmount
    financeProposedRepaymentMonths
    financeProposalNote
    financeProposedBy
    financeProposedAt
    financeContractFileName
    financeContractMimeType
    financeContractUploadedAt
    financeContractViewUrl
    employeeDecisionAt
    finalApprovedBy
    finalApprovedAt
    employeeApprovedAt
    declineReason
    employeeContractKey
    employeeSignedContract {
      id
      fileName
      mimeType
      status
      uploadedAt
      viewUrl
    }
    payment {
      id
      status
      amount
      currency
      checkoutUrl
      expiresAt
      paidAt
      failedAt
      paymentVendor
      localTransactionId
      bonumInvoiceId
      createdAt
      updatedAt
    }
    createdAt
    updatedAt
    viewContractUrl
  }
}

query GetAllBenefitRequests($status: String, $queue: String) {
  allBenefitRequests(status: $status, queue: $queue) {
    id
    employeeId
    benefitId
    status
    contractVersionAccepted
    contractAcceptedAt
    reviewedBy
    requestedAmount
    repaymentMonths
    financeProposedAmount
    financeProposedRepaymentMonths
    financeProposalNote
    financeProposedBy
    financeProposedAt
    financeContractFileName
    financeContractMimeType
    financeContractUploadedAt
    financeContractViewUrl
    employeeDecisionAt
    finalApprovedBy
    finalApprovedAt
    employeeApprovedAt
    declineReason
    employeeSignedContract {
      id
      fileName
      mimeType
      status
      uploadedAt
      viewUrl
    }
    payment {
      id
      status
      amount
      currency
      expiresAt
      paidAt
      failedAt
      paymentVendor
      localTransactionId
      bonumInvoiceId
      createdAt
      updatedAt
    }
    createdAt
    updatedAt
    viewContractUrl
  }
}

query GetEmployeeBenefits($employeeId: String!) {
  getEmployeeBenefits(employeeId: $employeeId) {
    benefitId
    status
    overrideStatus
    overrideBy
    overrideReason
    overrideExpiresAt
    benefit {
      id
      name
      description
      nameEng
      category
      subsidyPercent
      employeePercent
      unitPrice
      vendorName
      requiresContract
      isActive
      flowType
      optionsDescription
      approvalPolicy
    }
    ruleEvaluation {
      ruleType
      passed
      reason
    }
    failedRule {
      ruleType
      errorMessage
    }
  }
}

query GetContractsForBenefit($benefitId: String!) {
  contracts(benefitId: $benefitId) {
    id
    version
    isActive
    viewUrl
    vendorName
    effectiveDate
    expiryDate
  }
}

query GetEligibilityRules($benefitId: String!) {
  eligibilityRules(benefitId: $benefitId) {
    id
    benefitId
    ruleType
    operator
    value
    errorMessage
    priority
    isActive
  }
}

query GetMyScreenTimeMonth($benefitId: String!, $monthKey: String) {
  myScreenTimeMonth(benefitId: $benefitId, monthKey: $monthKey) {
    benefitId
    benefitStatus
    failedRuleMessage
    todayLocalDate
    activeSlotDate
    isUploadOpenToday
    program {
      benefitId
      screenshotRetentionDays
      winnerPercent
      rewardAmountMnt
      isActive
    }
    month {
      id
      benefitId
      employeeId
      monthKey
      requiredSlotDates
      dueSlotDates
      missingDueSlotDates
      rejectedDueSlotDates
      requiredSlotCount
      dueSlotCount
      submittedSlotCount
      approvedSlotCount
      monthlyAvgDailyMinutes
      competitionParticipantCount
      rankedParticipantCount
      rankPosition
      winnerCutoffRank
      isWinner
      rewardAmountMnt
      isProvisional
      status
      approvedByEmployeeId
      approvedAt
      decisionNote
      disqualificationReason
      submissions {
        id
        benefitId
        employeeId
        monthKey
        slotDate
        avgDailyMinutes
        confidenceScore
        platform
        periodType
        extractionStatus
        reviewStatus
        reviewNote
        submittedAt
        reviewedAt
        fileName
        viewUrl
      }
    }
  }
}

