query GetBenefitRequest($id: String!) {
  getBenefitRequest(id: $id) {
    id
    employeeId
    benefitId
    status
    contractVersionAccepted
    contractAcceptedAt
    reviewedBy
    requestedAmount
    repaymentMonths
    employeeApprovedAt
    declineReason
    viewContractUrl
    createdAt
    updatedAt
    employee {
      id
      name
      nameEng
      email
      role
    }
    benefit {
      id
      name
      category
      duration
      vendorName
    }
  }
}

