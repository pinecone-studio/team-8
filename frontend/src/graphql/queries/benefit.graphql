query GetBenefits($category: String) {
  benefits(category: $category) {
    id
    name
    description
    nameEng
    category
    subsidyPercent
    employeePercent
    unitPrice
    vendorName
    requiresContract
    flowType
    optionsDescription
    approvalPolicy
  }
}

query GetMyBenefits {
  myBenefits {
    benefitId
    status
    overrideStatus
    overrideBy
    overrideReason
    overrideExpiresAt
    benefit {
      id
      name
      description
      nameEng
      category
      subsidyPercent
      employeePercent
      unitPrice
      vendorName
      requiresContract
      flowType
      optionsDescription
      approvalPolicy
    }
    ruleEvaluation {
      ruleType
      passed
      reason
    }
    failedRule {
      ruleType
      errorMessage
    }
  }
}

query GetBenefitRequests {
  benefitRequests {
    id
    employeeId
    benefitId
    status
    contractVersionAccepted
    contractAcceptedAt
    reviewedBy
    requestedAmount
    repaymentMonths
    employeeApprovedAt
    declineReason
    createdAt
    updatedAt
    viewContractUrl
  }
}

query GetAllBenefitRequests($status: String, $queue: String) {
  allBenefitRequests(status: $status, queue: $queue) {
    id
    employeeId
    benefitId
    status
    contractVersionAccepted
    contractAcceptedAt
    reviewedBy
    requestedAmount
    repaymentMonths
    employeeApprovedAt
    declineReason
    createdAt
    updatedAt
    viewContractUrl
  }
}

query GetEmployeeBenefits($employeeId: String!) {
  getEmployeeBenefits(employeeId: $employeeId) {
    benefitId
    status
    overrideStatus
    overrideBy
    overrideReason
    overrideExpiresAt
    benefit {
      id
      name
      description
      nameEng
      category
      subsidyPercent
      employeePercent
      unitPrice
      vendorName
      requiresContract
      flowType
      optionsDescription
      approvalPolicy
    }
    ruleEvaluation {
      ruleType
      passed
      reason
    }
    failedRule {
      ruleType
      errorMessage
    }
  }
}

query GetContractsForBenefit($benefitId: String!) {
  contracts(benefitId: $benefitId) {
    id
    version
    isActive
    viewUrl
    vendorName
    effectiveDate
    expiryDate
  }
}

query GetEligibilityRules($benefitId: String!) {
  eligibilityRules(benefitId: $benefitId) {
    id
    benefitId
    ruleType
    operator
    value
    errorMessage
    priority
    isActive
  }
}
