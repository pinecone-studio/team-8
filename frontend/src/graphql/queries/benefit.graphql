query MyBenefits($employeeId: String!) {
  myBenefits(employeeId: $employeeId) {
    benefitId
    status
    ruleEvaluation {
      ruleType
      passed
      reason
    }
    failedRule {
      ruleType
      errorMessage
    }
    benefit {
      id
      name
      nameEng
      category
      subsidyPercent
      employeePercent
      unitPrice
      vendorName
      requiresContract
      flowType
      optionsDescription
      duration
    }
  }
}

