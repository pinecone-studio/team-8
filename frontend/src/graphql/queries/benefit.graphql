query GetBenefits($category: String) {
  benefits(category: $category) {
    id
    name
    description
    nameEng
    category
    subsidyPercent
    employeePercent
    unitPrice
    vendorName
    requiresContract
    isActive
    flowType
    optionsDescription
    approvalPolicy
    amount
    location
    imageUrl
  }
}

query GetMyBenefits {
  myBenefits {
    benefitId
    status
    overrideStatus
    overrideBy
    overrideReason
    overrideExpiresAt
    benefit {
      id
      name
      description
      nameEng
      category
      subsidyPercent
      employeePercent
      unitPrice
      vendorName
      requiresContract
      isActive
      flowType
      optionsDescription
      approvalPolicy
    }
    ruleEvaluation {
      ruleType
      passed
      reason
    }
    failedRule {
      ruleType
      errorMessage
    }
  }
}

