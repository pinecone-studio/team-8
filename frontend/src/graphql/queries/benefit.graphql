query GetBenefitRequests {
  benefitRequests {
    id
    employeeId
    benefitId
    status
    contractVersionAccepted
    contractAcceptedAt
    reviewedBy
    requestedAmount
    repaymentMonths
    employeeApprovedAt
    declineReason
    employeeContractKey
    employeeSignedContract {
      id
      fileName
      mimeType
      status
      uploadedAt
      viewUrl
    }
    createdAt
    updatedAt
    viewContractUrl
  }
}

query GetAllBenefitRequests($status: String, $queue: String) {
  allBenefitRequests(status: $status, queue: $queue) {
    id
    employeeId
    benefitId
    status
    contractVersionAccepted
    contractAcceptedAt
    reviewedBy
    requestedAmount
    repaymentMonths
    employeeApprovedAt
    declineReason
    employeeSignedContract {
      id
      fileName
      mimeType
      status
      uploadedAt
      viewUrl
    }
    createdAt
    updatedAt
    viewContractUrl
  }
}

query GetEmployeeBenefits($employeeId: String!) {
  getEmployeeBenefits(employeeId: $employeeId) {
    benefitId
    status
    overrideStatus
    overrideBy
    overrideReason
    overrideExpiresAt
    benefit {
      id
      name
      description
      nameEng
      category
      subsidyPercent
      employeePercent
      unitPrice
      vendorName
      requiresContract
      flowType
      optionsDescription
      approvalPolicy
    }
    ruleEvaluation {
      ruleType
      passed
      reason
    }
    failedRule {
      ruleType
      errorMessage
    }
  }
}

query GetContractsForBenefit($benefitId: String!) {
  contracts(benefitId: $benefitId) {
    id
    version
    isActive
    viewUrl
    vendorName
    effectiveDate
    expiryDate
  }
}

query GetEligibilityRules($benefitId: String!) {
  eligibilityRules(benefitId: $benefitId) {
    id
    benefitId
    ruleType
    operator
    value
    errorMessage
    priority
    isActive
  }
}

query GetMyScreenTimeMonth($benefitId: String!, $monthKey: String) {
  myScreenTimeMonth(benefitId: $benefitId, monthKey: $monthKey) {
    benefitId
    benefitStatus
    failedRuleMessage
    todayLocalDate
    activeSlotDate
    isUploadOpenToday
    program {
      benefitId
      screenshotRetentionDays
      isActive
      tiers {
        id
        benefitId
        label
        maxDailyMinutes
        salaryUpliftPercent
        displayOrder
      }
    }
    month {
      id
      benefitId
      employeeId
      monthKey
      requiredSlotDates
      dueSlotDates
      missingDueSlotDates
      requiredSlotCount
      submittedSlotCount
      approvedSlotCount
      monthlyAvgDailyMinutes
      awardedSalaryUpliftPercent
      status
      approvedByEmployeeId
      approvedAt
      decisionNote
      submissions {
        id
        benefitId
        employeeId
        monthKey
        slotDate
        avgDailyMinutes
        confidenceScore
        platform
        periodType
        extractionStatus
        reviewStatus
        reviewNote
        submittedAt
        reviewedAt
        fileName
        viewUrl
      }
    }
  }
}

query GetAdminScreenTimeMonth($benefitId: String!, $monthKey: String) {
  adminScreenTimeMonth(benefitId: $benefitId, monthKey: $monthKey) {
    benefitId
    monthKey
    slotDates
    program {
      benefitId
      screenshotRetentionDays
      isActive
      tiers {
        id
        benefitId
        label
        maxDailyMinutes
        salaryUpliftPercent
        displayOrder
      }
    }
    rows {
      employeeId
      employeeName
      employeeEmail
      result {
        id
        benefitId
        employeeId
        monthKey
        requiredSlotDates
        dueSlotDates
        missingDueSlotDates
        requiredSlotCount
        submittedSlotCount
        approvedSlotCount
        monthlyAvgDailyMinutes
        awardedSalaryUpliftPercent
        status
        approvedByEmployeeId
        approvedAt
        decisionNote
        submissions {
          id
          benefitId
          employeeId
          monthKey
          slotDate
          avgDailyMinutes
          confidenceScore
          platform
          periodType
          extractionStatus
          reviewStatus
          reviewNote
          submittedAt
          reviewedAt
          fileName
          viewUrl
        }
      }
    }
  }
}

query GetScreenTimeLeaderboard($benefitId: String!, $monthKey: String) {
  screenTimeLeaderboard(benefitId: $benefitId, monthKey: $monthKey) {
    rank
    employeeId
    employeeName
    employeeEmail
    monthKey
    status
    avgDailyMinutes
    awardedSalaryUpliftPercent
    approvedSlotCount
    dueSlotCount
    requiredSlotCount
    isProvisional
  }
}
